<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

</head>
<body>

    <header>
        <nav>
            <a href="index.html" target="_blank">My Homepage</a>
            <a href="Myabout2.html" target="_blank">About me</a>
            <a href="Myskills.html" target="_blank">My Skills</a>
            <a href="MyProject.html" target="_blank">My Projects</a>
            <a href="MyContact.html" target="_blank">Contact me</a>
        </nav>

    </header>
    <form>
        <h1 style="color: blue; font-size: 50px;"><strong>Contact Me</strong></h1>

     <form>

        <label for="firstName">First Name:</label>
        <input type="text" id="firstName" name="firstName" placeholder="Enter your first name" required><br><br>

        <label for="name">Last Name:</label>
        <input type="text" id="name" name="name" placeholder="Enter your last name" required><br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" placeholder="Enter your email" required><br><br>

        <label for="password">Password:</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" required><br><br>

        <label for="age">Age:</label>
        <input type="number" id="age" name="age" placeholder="Enter your age" required><br><br>

        <label for="message">Address:</label>
        <textarea id="message" name="message" placeholder="Enter your address"></textarea><br><br>

        <p>Your Gender</p>

        <input type="radio" id="male" name="gender" value="Male">
        <label for="male">Male</label><br>
        <input type="radio" id="female" name="gender" value="Female">
        <label for="female">Female</label><br>
        <input type="radio" id="other" name="gender" value="Other">
        <label for="other">Other</label><br>

        <p>Your Profession</p>
        <input type="checkbox" id="student" name="profession" value="Student">
        <label for="student">Student</label><br>
        <input type="checkbox" id="teacher" name="profession" value="Teacher">
        <label for="teacher">Teacher</label><br>
        <input type="checkbox" id="engineer" name="profession" value="Engineer">
        <label for="engineer">Engineer</label><br><br>

        <label for="country">Country:</label>
        <select id="country" name="country">
            <option value="India">India</option>
            <option value="USA">USA</option>
            <option value="UK">UK</option>
            <option value="Canada">Canada</option>
        </select><br><br>   

    
        <button type="submit">Submit</button>
    </form>
    
</body>
</html>
